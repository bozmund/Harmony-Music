name: harmonymusic
description: A cross platform app for music streaming.
publish_to: "none"

version: 5.9.2+28

environment:
  sdk: ">=3.10.3 <4.0.0"
dependencies:
  animations: ^2.2.0
  app_links: ^7.2.0
  archive: ^4.0.9
  audio_service:
    path: third_party/audio_service
  audio_video_progress_bar: ^2.0.3
  buttons_tabbar: ^1.3.15
  cached_network_image: ^3.4.1
  dio: ^5.9.2
  file_selector: ^1.1.0
  flutter:
    sdk: flutter
  flutter_keyboard_visibility: ^6.0.0
  flutter_lyric: ^3.0.7
  flutter_slidable: ^4.0.3
  get: ^4.7.3
  google_fonts: ^8.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  html: ^0.15.6
  jni: ^1.0.0
  jni_flutter: ^1.0.1
  just_audio:
    path: third_party/just_audio
  just_audio_media_kit:
    git:
      url: https://github.com/anandnet/just_audio_media_kit.git
      ref: 6672eb82657d9e671abbf42122031c88aa9e6d80
  path: ^1.9.1
  path_provider: ^2.1.6
  permission_handler: ^12.0.3
  shimmer: ^3.0.0
  sidebar_with_animation:
    git:
      url: https://github.com/anandnet/animated_side_bar.git
      ref: b53567a42b4ba3793a3cf00d478bdba0ecce33d7
  smtc_windows: ^1.1.0
  toggle_switch: ^2.3.0
  tray_manager: ^0.5.3
  widget_marquee: ^0.0.8
  window_manager: ^0.5.1
  youtube_explode_dart:
    path: third_party/youtube_explode_dart
dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mocktail: ^1.0.5
  http_mock_adapter: ^0.6.1
  jnigen: ^0.16.0
  mockito: ^5.7.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
