name: PR checks

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  flutter-checks:
    name: Analyze and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.1'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install packages
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Check for unused files and code
        # Blocking: the codebase is clean as of 6.0.0, so any finding is new
        # dead code introduced by the PR. Generated bindings are excluded.
        run: |
          dart run dart_code_linter:metrics check-unused-files lib --exclude "lib/native_bindings/**"
          dart run dart_code_linter:metrics check-unused-code lib --exclude "lib/native_bindings/**"

      - name: Test
        run: flutter test
